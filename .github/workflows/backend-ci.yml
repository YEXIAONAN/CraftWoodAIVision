name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Verify module imports
        run: |
          python -c "
          from app.config import settings
          from app.database import Base, engine
          from app.security import create_access_token, verify_password
          from app.models import User, Product, InspectionRecord, WarehouseRecord, ReportRecord, AfterSalesRecord, TraceRecord
          print(f'✓ All modules imported — {settings.APP_NAME} v{settings.APP_VERSION}')
          "

      - name: Run tests (if present)
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null; then
            python -m pytest --cov=app --cov-report=term-missing
          else
            echo "No test suite found — skipping tests"
          fi
