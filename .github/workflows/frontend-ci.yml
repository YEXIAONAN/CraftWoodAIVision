name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx vue-tsc --noEmit 2>/dev/null || echo "vue-tsc not configured — skipping type-check"

      - name: Build production
        run: npm run build

      - name: Verify dist output
        run: |
          if [ -d dist ] && [ -f dist/index.html ]; then
            echo "✓ Build verified — dist/index.html present"
          else
            echo "✗ Build verification failed"
            exit 1
          fi
