# ============================================================
# CraftWoodAIVision · 匠木云检 — Redis 配置文件
# ============================================================

bind 0.0.0.0
port 6379
daemonize no

# 持久化：快照 + AOF
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec

# 内存管理
maxmemory 512mb
maxmemory-policy allkeys-lru

# 安全
requirepass craftwood-redis

# 连接
timeout 300
tcp-keepalive 60
maxclients 1000

# 日志
loglevel notice
logfile ""
